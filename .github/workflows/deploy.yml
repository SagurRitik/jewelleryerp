name: Deploy JewelryERP

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 122.176.216.225
          username: root
          port: 22
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Go to project directory"
            cd /var/www/html/jewelleryerp

            echo "Load Local Node & NVM Environment"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            echo "Reset old code"
            git fetch origin
            git reset --hard origin/main

            echo "Pull latest code"
            git pull origin main

            echo "Backend setup"
            cd backend
            npm install

            echo "Frontend setup"
            cd ../frontend
            npm install

            echo "Build frontend"
            npm run build

            echo "Restart backend with local PM2"
            cd ../backend
            
            # Local PM2 binary ka sahi path use kar rahe hain jo isolated hai
            ../node_modules/.bin/pm2 restart jewellery-backend || ../node_modules/.bin/pm2 start server.js --name jewellery-backend --update-env

            echo "Save PM2 configuration"
            ../node_modules/.bin/pm2 save

            echo "PM2 Status"
            ../node_modules/.bin/pm2 list
