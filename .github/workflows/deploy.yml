name: Deploy JewelryERP

on:
  push:
    branches:
      - main
      # - development   # uncomment to also deploy on pushes to development

# Prevent overlapping deploys; a newer push cancels an in-progress one
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true   # abort the deploy if any command below fails
          script: |
            set -e
            echo "==> Project directory"
            cd /var/www/html/jewelleryerp

            echo "==> Sync code with origin/main (discards local changes to tracked files)"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Backend dependencies"
            cd backend
            npm install --omit=dev

            echo "==> Frontend dependencies + production build"
            cd ../frontend
            npm install
            npm run build

            echo "==> Restart backend (pm2)"
            cd ../backend
            pm2 restart jewellery-backend --update-env || pm2 start server.js --name jewellery-backend --update-env
            pm2 save

            echo "==> Reload Nginx (serves the fresh frontend build)"
            nginx -t && systemctl reload nginx

            echo "==> Status"
            pm2 list
            echo "Deploy complete."
